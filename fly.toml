# fly.io config for the ClojureWasm bookshelf demo. Root-context Dockerfile, so
# this deploys by selecting the repo ("Deploy from GitHub") or `fly launch`.
# See DEPLOY.md.

app = "cw-serverless-demo"
primary_region = "nrt"            # Tokyo; change to your nearest region.

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  CLJW_FS_ROOT = "/app"
  # GOOGLE_CLIENT_ID is a secret — set it with `fly secrets set GOOGLE_CLIENT_ID=…`
  # (NOT here, NOT in git). Sign-in is disabled until it is set.

# Persistent SQLite store (data/books.db). Fly Volumes are per-machine NVMe with
# daily snapshots (no built-in replication) — fine for a single-machine demo.
# Create once: `fly volumes create bookshelf_data --size 1 --region nrt`.
[mounts]
  source = "bookshelf_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080            # must match PORT (the app's 0.0.0.0 listen port).
  force_https = true
  auto_stop_machines = "stop"     # scale to zero when idle; the volume persists.
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"                # sqlite3.wasm + cover wasm run in-process via wasm/run.
  cpus = 1
